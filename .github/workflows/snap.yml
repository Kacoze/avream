name: Snap

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build snap artifact
        id: build
        uses: snapcore/action-build@v1

      - name: Smoke test snap
        run: |
          sudo snap install --dangerous --classic "${{ steps.build.outputs.snap }}"
          snap run avream --help >/dev/null
          snap run avream.avreamd --help >/dev/null
          sudo snap remove avream

      - name: Upload snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: avream-snap
          path: ${{ steps.build.outputs.snap }}
          if-no-files-found: error

  publish-snap:
    needs: build-snap
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
    steps:
      - name: Preflight publish gate
        id: preflight
        run: |
          if [ -n "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping publish-snap: SNAPCRAFT_STORE_CREDENTIALS is not configured."
          fi

      - uses: actions/download-artifact@v5
        if: ${{ steps.preflight.outputs.publish == 'true' }}
        with:
          name: avream-snap
          path: dist

      - name: Select release channel
        id: channel
        if: ${{ steps.preflight.outputs.publish == 'true' }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=stable" >> "$GITHUB_OUTPUT"
          else
            echo "name=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish snap
        if: ${{ steps.preflight.outputs.publish == 'true' }}
        uses: snapcore/action-publish@v1
        with:
          snap: dist/*.snap
          release: ${{ steps.channel.outputs.name }}
