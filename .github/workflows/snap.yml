name: Snap

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build snap artifact
        id: build
        uses: snapcore/action-build@v1

      - name: Smoke test snap
        run: |
          sudo snap install --dangerous "${{ steps.build.outputs.snap }}"
          /snap/bin/avream --help >/dev/null
          /snap/bin/avreamd --help >/dev/null
          sudo snap remove avream

      - name: Upload snap artifact
        uses: actions/upload-artifact@v6
        with:
          name: avream-snap
          path: ${{ steps.build.outputs.snap }}
          if-no-files-found: error

  publish-snap:
    needs: build-snap
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
    if: ${{ env.SNAPCRAFT_STORE_CREDENTIALS != '' }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: avream-snap
          path: dist

      - name: Select release channel
        id: channel
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=stable" >> "$GITHUB_OUTPUT"
          else
            echo "name=edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish snap
        uses: snapcore/action-publish@v1
        with:
          snap: dist/*.snap
          release: ${{ steps.channel.outputs.name }}
